# Decap CMS Configuration
# Defines what content the team can manage through /admin

backend:
  name: git-gateway
  branch: main

# Where uploaded media files are stored
media_folder: "uploads"
public_folder: "/uploads"

# Site URL for previews
site_url: https://uglydonutswebsite.netlify.app
display_url: https://uglydonutswebsite.netlify.app
logo_url: https://uglydonutswebsite.netlify.app/og-image.jpg

# ============================================================
# COLLECTIONS
# ============================================================
collections:

  # ----------------------------------------
  # MENU ITEMS - simplified
  # ----------------------------------------
  - name: "menu"
    label: "Menu Items"
    label_singular: "Menu Item"
    folder: "content/menu"
    create: true
    delete: true
    slug: "{{slug}}"
    summary: "{{name}} · {{category}}"
    sortable_fields: ["name", "category"]
    view_filters:
      - label: "Corn Dogs"
        field: category
        pattern: "Corn Dog"
      - label: "Donuts"
        field: category
        pattern: "Donut"
      - label: "Beverages"
        field: category
        pattern: "Beverage"
    fields:
      - {label: "Name", name: "name", widget: "string", hint: "e.g. Hot Cheetos Corn Dog"}
      - label: "Category"
        name: "category"
        widget: "select"
        options:
          - "Korean Corn Dogs"
          - "Donuts"
          - "Ice Cream Donuts"
          - "Fruit Refreshers"
          - "Fizzy Refreshers"
          - "Ugly Boba"
          - "Coco Sips"
          - "Smoothies"
        default: "Corn Dog"
      - {label: "Photo", name: "photo", widget: "image", required: false, hint: "Square photo works best (1:1 ratio)"}
      - {label: "Description", name: "description", widget: "text", required: false, hint: "1-2 sentences. Keep it short and tasty."}
      - label: "Best Seller"
        name: "best_seller"
        widget: "boolean"
        default: false
        required: false
        hint: "Toggle on to show this item on the homepage Best Sellers section (max 4 displayed)"

  # ----------------------------------------
  # ARTICLES / JOURNAL
  # ----------------------------------------
  - name: "articles"
    label: "Journal Articles"
    label_singular: "Article"
    folder: "content/articles"
    create: true
    delete: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    summary: "{{title}} · {{published_date}}"
    sortable_fields: ["published_date", "title"]
    fields:
      - {label: "Title", name: "title", widget: "string", hint: "Headline that appears on the card"}
      - {label: "Published Date", name: "published_date", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false}
      - label: "Category"
        name: "category"
        widget: "select"
        options: ["The Brand", "Menu", "The Team", "Behind the Scenes", "Press"]
        default: "The Brand"
      - {label: "Cover Photo", name: "cover", widget: "image", required: false, hint: "16:9 or 4:3 works best"}
      - {label: "Excerpt", name: "excerpt", widget: "text", hint: "1-2 sentences shown on the home page"}
      - {label: "Read Time", name: "read_time", widget: "string", default: "3 min read", hint: "e.g. '3 min read'"}
      - {label: "Body", name: "body", widget: "markdown", hint: "Full article content"}
      - {label: "Draft?", name: "draft", widget: "boolean", default: false, required: false, hint: "If checked, NOT shown on the live site"}

  # ----------------------------------------
  # LOCATIONS - simplified
  # ----------------------------------------
  - name: "locations"
    label: "Store Locations"
    label_singular: "Location"
    folder: "content/locations"
    create: true
    delete: true
    slug: "{{slug}}"
    summary: "{{name}} · {{city}}, {{state}}"
    sortable_fields: ["name"]
    fields:
      - {label: "Store Name", name: "name", widget: "string", hint: "e.g. American Dream"}
      - {label: "City", name: "city", widget: "string"}
      - {label: "State", name: "state", widget: "string", hint: "Two-letter abbreviation, e.g. NJ"}
      - {label: "Full Address", name: "address", widget: "string", required: false, hint: "Street address"}
      - label: "Type"
        name: "store_type"
        widget: "select"
        options: ["Flagship", "Standalone store", "Mall, Level 1", "Mall, Level 2", "Food Hall", "Other"]
        default: "Standalone store"
      - {label: "Photo", name: "photo", widget: "image", required: false}
      - {label: "Phone", name: "phone", widget: "string", required: false}
      - {label: "Hours", name: "hours", widget: "text", required: false, hint: "e.g. Mon-Fri: 11am-9pm"}
      - {label: "Google Maps URL", name: "maps_url", widget: "string", required: false, hint: "Full Google Maps link"}
      - label: "Order Online URL"
        name: "order_url"
        widget: "string"
        required: false
        hint: "Toast Online Ordering URL for this location (e.g., https://uglydonutsncorndogs.com/order?utm_source=...&utm_term=american_dream)"
